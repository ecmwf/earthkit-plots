id: total-precipitation
optimal: TOTAL_PRECIPITATION_BLUE_GRADIENT

styles:

  TOTAL_PRECIPITATION_BLUE_GRADIENT:
    name: precipitation-blue-gradient
    type: Style
    colors:
    - '#ffffff'
    - '#6FAFD6'
    - '#08326E'
    extend: max

  TOTAL_PRECIPITATION_IN_MM:
    name: precipitation-mm
    type: Style
    colors: turbo
    extend: max
    units: mm

  TOTAL_PRECIPITATION_IN_M:
    name: precipitation-m
    type: Style
    colors: ["white", "#84BCDC", "#08306B"]
    extend: max
    units: m

  TOTAL_PRECIPITATION_IN_KG_M-2:
    name: precipitation-kg-m2
    type: Style
    colors: turbo
    extend: max
    units: kg m-2
