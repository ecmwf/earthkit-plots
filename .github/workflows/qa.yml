name: Quality assurance
on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]
    types: [opened, synchronize, reopened]
jobs:
  pre-commit:
    uses: ecmwf/reusable-workflows/.github/workflows/qa-precommit-run.yml@v2
    with:
      skip-hooks: "no-commit-to-branch"
  tests:
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    uses: ecmwf/reusable-workflows/.github/workflows/qa-pytest-pyproject.yml@v2
    with:
      python-version: ${{ matrix.python-version }}
      optional-dependencies: "test"
      custom-pytest: "pytest -m 'not mpl_image'"

  image-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[test]"
      - name: Run image tests
        run: python -m pytest -vv -m mpl_image --test-images
      - name: Upload image comparison results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mpl-image-comparison
          path: mpl-results/
